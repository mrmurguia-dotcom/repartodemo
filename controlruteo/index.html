<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M2 - Dashboard Central de Ruteo</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    /* Estilos basados en tu paleta de colores */
    body { font-family: 'Roboto', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    h1 { margin: 0; color: #1e3a5f; font-size: 1.5rem; }
    
    .btn-refresh { background: #1e3a5f; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    .btn-refresh:hover { background: #2a528a; }

    .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    
    .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.2s; }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; border-bottom: 1px solid #dee2e6; padding-bottom: 10px; }
    .cp-title { font-size: 1.2rem; font-weight: bold; color: #1e3a5f; }
    
    .card-body { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .chart-container { width: 100px; height: 100px; }

    /* Colores solicitados para el detalle */
    .info-detalles { display: none; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ccc; }
    .info-detalles li { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.9rem; font-weight: bold; }
    
    .btn-sheet { display: block; width: 100%; text-align: center; background: #dee2e6; color: black; text-decoration: none; padding: 10px; margin-top: 15px; border-radius: 8px; font-weight: bold; }
  </style>
</head>
<body>

<div class="header">
  <h1>📊 Panel Central M2</h1>
  <button class="btn-refresh" onclick="cargarDashboard()">🔄 Actualizar Datos</button>
</div>

<div id="grid" class="grid-container">
  <div style="grid-column: 1/-1; text-align: center;">Conectando con Google Sheets...</div>
</div>

<script>
  // REEMPLAZA ESTA URL CON LA DE TU IMPLEMENTACIÓN DE APPS SCRIPT
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxXr0Q-jP2dfamFAU6U10nNNctjny7Sl7WkqVr251Ks6RrnLdXWPFylNFOykE0YmKfF/exec";

  async function cargarDashboard() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">Cargando información actualizada...</div>';
    
    try {
      const response = await fetch(`${WEB_APP_URL}?action=getDashboard`);
      const resumen = await response.json();
      renderizar(resumen);
    } catch (err) {
      grid.innerHTML = `<div style="color:red">Error de conexión: ${err.message}</div>`;
    }
  }

  function renderizar(resumen) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    resumen.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      
      const s = item.stats;
      const progreso = Math.round(((item.total - s.PENDIENTE) / item.total) * 100) || 0;

      card.innerHTML = `
        <div class="card-header">
          <span class="cp-title">CP ${item.cp}</span>
          <span style="font-size:0.8rem">${item.estadoRuta}</span>
        </div>
        <div class="card-body" onclick="document.getElementById('det-${index}').style.display = document.getElementById('det-${index}').style.display === 'block' ? 'none' : 'block'">
          <div class="chart-container"><canvas id="c-${index}"></canvas></div>
          <div style="text-align: right;">
             <div style="font-size: 1.8rem; font-weight: bold;">${progreso}%</div>
             <div style="font-size: 0.7rem; color: #666;">PROGRESO</div>
          </div>
        </div>
        <div id="det-${index}" class="info-detalles">
          <li style="color:#2d572c">Entregados: ${s.ENTREGADO}</li>
          <li style="color:#856404">Parciales: ${s.PARCIAL}</li>
          <li style="color:#a52828">Totales: ${s.TOTAL}</li>
          <li style="color:#666">Pendientes: ${s.PENDIENTE}</li>
          <a href="${item.url}" target="_blank" class="btn-sheet">IR A LA PLANILLA</a>
        </div>
      `;
      grid.appendChild(card);

      new Chart(document.getElementById(`c-${index}`), {
        type: 'doughnut',
        data: {
          datasets: [{
            data: [s.ENTREGADO, s.PARCIAL, s.TOTAL, s.PENDIENTE],
            backgroundColor: ['#b6d7a8', '#ffe599', '#ea9999', '#dee2e6'], // Colores originales
            borderWidth: 0
          }]
        },
        options: { cutout: '75%', plugins: { legend: { display: false } } }
      });
    });
  }

  window.onload = cargarDashboard;
</script>
</body>
</html>
