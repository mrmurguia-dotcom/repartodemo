
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M2 - Panel de Chofer</title>
    <link rel="manifest" href="manifest.json?v=2">
    
    <link rel="apple-touch-icon" sizes="180x180" href="apple-icon-180x180.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <meta name="theme-color" content="#1e3a5f">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .btn-m2 { background: #1e3a5f; transition: all 0.2s; }
        .btn-m2:active { transform: scale(0.98); }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #1e3a5f; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8">

    <div id="vistaIngreso" class="bg-white p-6 rounded-3xl shadow-xl max-w-md mx-auto space-y-5 border border-slate-200">
        <div class="text-center">
            <img src="../logom2.jpg" alt="M2" class="mx-auto w-24 mb-2">
            <h1 class="text-xl font-black text-[#1e3a5f]">Ingreso de Chofer</h1>
        </div>
        <input type="number" id="cpInput" class="w-full p-4 rounded-xl border-2 border-slate-100 outline-none focus:border-blue-900 bg-slate-50" placeholder="Nro Carta de Porte (Ej: 10186)">
        <select id="choferSelect" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-white">
            <option value="" disabled selected>Seleccione Chofer...</option>
            <option value="JOSE LOPEZ">JOSE LOPEZ</option>
            <option value="JUAN PEREZ">JUAN PEREZ</option>
            <option value="ALEJANDRO RODRIGUEZ">ALEJANDRO RODRIGUEZ</option>
            <option value="otro">OTRO...</option>
        </select>
        <button onclick="buscarCP()" id="btnBuscar" class="w-full btn-m2 text-white p-4 rounded-xl font-black shadow-lg shadow-blue-900/20 active:scale-95">CARGAR RECORRIDO</button>
    </div>

    <div id="vistaCarga" class="hidden max-w-md mx-auto space-y-4 animate-in fade-in duration-500">
        <div class="bg-[#1e3a5f] p-4 rounded-2xl text-white flex justify-between items-center shadow-lg">
            <div>
                <p class="text-[10px] opacity-70 font-bold uppercase tracking-widest">Hoja de Ruta</p>
                <p id="fechaLabel" class="text-sm font-black italic"></p>
            </div>
            <button onclick="cerrarSesion()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-xs font-bold active:scale-95 transition-all">SALIR</button>
        </div>
        <div id="contenedorClientes" class="space-y-3"></div>
    </div>

    <div id="modalNovedades" class="hidden fixed inset-0 bg-black/80 z-50 p-4 flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white p-6 rounded-3xl w-full max-w-sm space-y-5 shadow-2xl animate-in zoom-in duration-200">
            <div class="flex justify-between border-b pb-3 items-start">
                <h3 class="text-lg font-black text-[#1e3a5f] leading-tight">FACTURA:<br><span id="faciLabel" class="text-orange-500 text-base"></span></h3>
                <button onclick="cerrarModal()" class="text-slate-400 text-3xl hover:text-red-500 leading-none">&times;</button>
            </div>
            
            <div class="grid gap-2.5">
                <button onclick="confirmarEntregado()" class="btn-status w-full p-4 rounded-xl border-2 border-slate-100 font-black text-left hover:bg-emerald-50 hover:border-emerald-200 transition-all text-slate-700"><span class="text-emerald-500 mr-2">A-</span> ENTREGADO</button>
                <button onclick="setRechazo('RECHAZO PARCIAL', this)" class="btn-status w-full p-4 rounded-xl border-2 border-slate-100 font-black text-left hover:bg-amber-50 hover:border-amber-200 transition-all text-slate-700"><span class="text-amber-500 mr-2">B-</span> RECHAZO PARCIAL</button>
                <button onclick="setRechazo('RECHAZO TOTAL', this)" class="btn-status w-full p-4 rounded-xl border-2 border-slate-100 font-black text-left hover:bg-red-50 hover:border-red-200 transition-all text-slate-700"><span class="text-red-500 mr-2">C-</span> RECHAZO TOTAL</button>
            </div>

            <div id="seccionNovedad" class="hidden space-y-3 pt-4 border-t border-slate-100">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest">Motivo de Rechazo</label>
                <select id="motivoSelect" class="w-full p-4 rounded-xl border-2 border-slate-100 bg-slate-50 text-sm font-bold outline-none focus:border-blue-500">
                    <option value="" disabled selected>Seleccione motivo...</option>
                    <option value="1- cliente cerrado">1- cliente cerrado</option>
                    <option value="2- diferencia de precio">2- diferencia de precio</option>
                    <option value="3- pedido duplicado">3- pedido duplicado</option>
                    <option value="4- no pedido">4- no pedido</option>
                    <option value="5- otros motivos">5- otros motivos</option>
                </select>
                
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mt-2">Foto (Obligatoria)</label>
                <button onclick="document.getElementById('fotoInput').click()" class="w-full p-4 bg-blue-50 text-blue-700 rounded-xl font-bold border-2 border-blue-200 active:scale-95 flex justify-center items-center gap-2">📷 SACAR FOTO COMPROBANTE</button>
                <input type="file" id="fotoInput" accept="image/*" capture="camera" class="hidden" onchange="previewFoto(this)">
                
                <div id="previewContainer" class="hidden relative mt-2 border-4 border-blue-100 rounded-xl overflow-hidden">
                    <img id="imgPreview" class="w-full h-auto object-cover">
                    <button onclick="borrarFoto()" class="absolute top-2 right-2 bg-red-600 text-white rounded-full w-8 h-8 font-bold text-xl flex items-center justify-center shadow-lg">&times;</button>
                </div>
            </div>

            <button onclick="enviarFinal()" id="btnFin" class="w-full p-5 btn-m2 text-white rounded-xl font-black shadow-lg active:scale-95 transition-all mt-2">GUARDAR CAMBIOS</button>
        </div>
    </div>

    <script>
        // --- PEGAR ACÁ TU URL DE APPS SCRIPT ---
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwyO_NRQW-f9rEGGhLFhU9naB8IjvDlEfWOEeiyE8Wd2txdZU63KxDe5jOswdV7aoaG/exec"; 
        
        let appData = { lista: [], cp: "", chofer: "", current: {} };

        async function buscarCP() {
            appData.cp = document.getElementById('cpInput').value;
            appData.chofer = document.getElementById('choferSelect').value;
            if(!appData.cp || !appData.chofer) return alert("Por favor complete Carta de Porte y Chofer");
            
            const btn = document.getElementById('btnBuscar');
            btn.innerHTML = '<span class="spinner"></span> CARGANDO...';
            btn.disabled = true;
            
            try {
                const resp = await fetch(`${WEB_APP_URL}?action=buscarCP&cp=${appData.cp}`);
                const data = await resp.json();
                
                if(data.error) throw new Error(data.error);

                appData.lista = data.listaClientes;
                document.getElementById('fechaLabel').innerText = data.fecha;
                renderizarLista();
                document.getElementById('vistaIngreso').classList.add('hidden');
                document.getElementById('vistaCarga').classList.remove('hidden');
            } catch (e) { 
                alert("Error: No se encontró la Carta de Porte o hubo un problema de conexión."); 
            } finally {
                btn.innerHTML = "CARGAR RECORRIDO"; 
                btn.disabled = false;
            }
        }

        function renderizarLista() {
            const cont = document.getElementById('contenedorClientes');
            // Filtramos solo clientes que tengan al menos una factura PENDIENTE
            const clientesPendientes = appData.lista.filter(c => c.documentos.some(d => d.status === 'PENDIENTE'));
            
            if (clientesPendientes.length === 0 && appData.lista.length > 0) {
                cont.innerHTML = `
                    <div class="bg-emerald-500 text-white p-8 rounded-3xl text-center shadow-2xl mt-8">
                        <p class="text-5xl mb-4">🎉</p>
                        <p class="font-black text-2xl uppercase tracking-tighter leading-tight">¡Recorrido<br>Finalizado!</p>
                        <p class="text-sm opacity-90 mt-3 font-medium">Excelente trabajo. Podés cerrar sesión.</p>
                    </div>`;
                return;
            }

            cont.innerHTML = clientesPendientes.map((c, i) => `
                <div id="cliente-card-${i}" class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-3">
                    <div class="p-4 flex justify-between items-center bg-slate-50 border-b border-slate-100">
                        <div class="max-w-[75%]">
                            <p class="font-black text-[#1e3a5f] text-sm uppercase leading-tight">${c.nombre}</p>
                            <p class="text-[10px] text-slate-500 font-bold mt-1 truncate">${c.direccion}</p>
                        </div>
                        <button onclick="toggleDocs(${i})" class="bg-[#1e3a5f] text-white text-[10px] px-3 py-2 rounded-lg font-black shadow-sm active:scale-95">VER DOCS</button>
                    </div>
                    <div id="docs-${i}" class="p-3 bg-white space-y-2 hidden">
                        ${c.documentos.filter(d => d.status === 'PENDIENTE').map(d => `
                            <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                                <span class="text-xs font-bold text-slate-700">${d.numero}</span>
                                <button onclick="abrirModal('${d.fila}', '${d.numero}', ${i})" class="bg-orange-500 text-white text-[10px] px-4 py-2 rounded-lg font-black active:scale-95 shadow-sm">NOVEDAD</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function abrirModal(fila, factura, indexCliente) {
            appData.current = { fila, factura, indexCliente, status: '', foto: null, multiple: null };
            document.getElementById('faciLabel').innerText = factura;
            document.getElementById('modalNovedades').classList.remove('hidden');
            resetModal();
        }

        function confirmarEntregado() {
            const cliente = appData.lista[appData.current.indexCliente];
            const facturasPendientes = cliente.documentos.filter(d => d.status === 'PENDIENTE');

            // Si hay más de una, preguntamos
            if (facturasPendientes.length > 1) {
                if (confirm(`Este cliente tiene ${facturasPendientes.length} facturas pendientes.\n\n¿Querés marcar TODAS como ENTREGADAS?`)) {
                    appData.current.multiple = facturasPendientes.map(f => f.fila);
                } else {
                    appData.current.multiple = null; // Solo la actual
                }
            }
            
            appData.current.status = 'ENTREGADO';
            
            // Para entregado no hace falta foto, mandamos directo
            enviarFinal();
        }

        function setRechazo(tipo, btn) {
            appData.current.status = tipo;
            
            // Estilos de botones
            document.querySelectorAll('.btn-status').forEach(b => b.classList.remove('ring-2', 'ring-blue-500', 'bg-slate-50'));
            btn.classList.add('ring-2', 'ring-blue-500', 'bg-slate-50');
            
            document.getElementById('seccionNovedad').classList.remove('hidden');
        }

        function previewFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    appData.current.foto = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function borrarFoto() {
            document.getElementById('fotoInput').value = "";
            document.getElementById('previewContainer').classList.add('hidden');
            appData.current.foto = null;
        }

        async function enviarFinal() {
            // Validaciones si es rechazo
            if (appData.current.status !== 'ENTREGADO') {
                if (!document.getElementById('motivoSelect').value) return alert("Falta seleccionar el motivo del rechazo.");
                if (!appData.current.foto) return alert("Es OBLIGATORIO sacar una foto al comprobante con la novedad.");
            }

            const btn = document.getElementById('btnFin');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> GUARDANDO...';

            const payload = {
                action: 'guardarNovedad',
                info: {
                    cp: appData.cp, 
                    chofer: appData.chofer,
                    fila: appData.current.fila,
                    factura: appData.current.factura,
                    status: appData.current.status,
                    motivo: document.getElementById('motivoSelect').value,
                    archivoB64: appData.current.foto, // Será null si es ENTREGADO
                    filasMultiple: appData.current.multiple // Será array si dio SÍ a todo, o null
                }
            };

            // Simulación de guardado local para "desaparecer" clientes rápido en la pantalla
            actualizarEstadoLocal();
            
            try {
                // Enviamos sin esperar respuesta legible por temas de CORS
                await fetch(WEB_APP_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            } catch (e) {
                console.log("Enviado (el error de CORS es normal acá).");
            }
            
            cerrarModal();
            renderizarLista();
        }

        function actualizarEstadoLocal() {
            const cliente = appData.lista[appData.current.indexCliente];
            if (appData.current.multiple) {
                // Marcó SÍ a todo
                cliente.documentos.forEach(d => d.status = appData.current.status);
            } else {
                // Solo esta factura
                const doc = cliente.documentos.find(d => d.fila == appData.current.fila);
                if (doc) doc.status = appData.current.status;
            }
        }

        // --- NUEVA FUNCIÓN PARA CERRAR SESIÓN SIN RECARGAR ---
        function cerrarSesion() {
            if(confirm("¿Seguro que deseás salir del recorrido actual?")) {
                // Limpiamos los datos
                appData = { lista: [], cp: "", chofer: "", current: {} };
                
                // Limpiamos los inputs
                document.getElementById('cpInput').value = "";
                document.getElementById('choferSelect').value = "";
                
                // Cambiamos las vistas
                document.getElementById('vistaCarga').classList.add('hidden');
                document.getElementById('vistaIngreso').classList.remove('hidden');
                
                // Limpiamos el contenedor por si acaso
                document.getElementById('contenedorClientes').innerHTML = "";
            }
        }

        function resetModal() {
            document.getElementById('seccionNovedad').classList.add('hidden');
            document.querySelectorAll('.btn-status').forEach(b => b.classList.remove('ring-2', 'ring-blue-500', 'bg-slate-50'));
            document.getElementById('motivoSelect').value = "";
            borrarFoto();
            const btn = document.getElementById('btnFin');
            btn.innerHTML = "GUARDAR CAMBIOS";
            btn.disabled = false;
        }

        function toggleDocs(i) { document.getElementById(`docs-${i}`).classList.toggle('hidden'); }
        function cerrarModal() { document.getElementById('modalNovedades').classList.add('hidden'); }
    </script>
</body>
</html>
